body:
  dashboard:
    summary: A clear workshop-style view of your bikes, service history, and day-to-day activity.
    inventory: Current motorcycles prepared for the shop floor and ready for inspection.
    sidebar: Start a new bike record and keep the workshop inventory current.
  bikeIndex:
    summary: A workshop-style bike register with mileage, fuel, and service context available at a glance.
    inventory: Review each bike, open its detail page, or jump straight into refueling and maintenance work.
    sidebar: Create a bike or register the next fuel stop without leaving the dashboard.
    empty: Start the inventory with your first motorcycle and its workshop record.
  bikeShow:
    summary: A workshop-ready bike file with fuel, maintenance, and service timing in one place.
    statistics: Key running costs, refueling sample quality, and tracked service items.
    parts: Part-by-part service history, interval adherence, and current performance against the service plan.
    partSelector: Focus one part at a time to review its service trend, interval fit, and history.
    upcoming: The next service events sorted by urgency, including due mileage and dates.
    alerts: Overdue work and weak fuel statistics that need attention first.
    serviceIntervals: Current service intervals with history pulled from recent maintenance entries.
    refueling: Refueling history with averages based on full, meaningful samples instead of tiny top-ups.
    maintenance: Workshop history, time spent, and costs recorded for this bike.
    sidebar: Log fuel, add maintenance, or jump straight into the service schedule from here.
    noAlerts: No active alerts. This bike is currently on schedule.
    noUpcomingEvents: No service intervals are configured for this bike.
    usingPurchaseBaseline: When a task has never been recorded, the purchase date or purchase odometer is used as the starting point.
    refuelingThreshold: Fuel averages ignore partial or very small fills below %threshold% l.
    refuelingPending: Fuel averages need a full refueling of at least %threshold% l before they become reliable.
    refuelingSingleSample: Fuel averages are currently based on a single qualified full refueling.
    refuelingFiltered: "%count% small or partial refuelings were excluded from the fuel averages."
    noPartStats: No part-level service history is available yet.
    noPartHistory: No maintenance entries have been recorded for this part yet.
  servicePlan:
    bike: Review the effective service plan for this bike and add bike-specific interval overrides where needed.
    bikeCurrent: Model defaults and bike-specific overrides combined for this machine.
    model: Maintain the reusable service plan for this model, including parts, tasks, and default intervals.
    modelCurrent: Current model-level tasks and service intervals grouped by part.
    modelSwitch: Choose a manufacturer and model here. Existing-task suggestions stay limited to the selected model plus universal tasks.
    override: Add or override an interval for one task on this bike without changing the model defaults.
    existingTaskModelScoped: Reuse tasks already tracked on this model. Partless tasks are treated as universal and can be reused across models.
    partOptional: Leave the part empty to create a general task that can also be reused across other models.
    partEditor: Register a new part for this manufacturer so tasks can be attached to it.
    taskEditor: Reuse an existing task or create a new one, then attach a default model interval.
    empty: No service-plan entries are configured yet.
  delete:
    userModal: Do you really want to delete the user?

