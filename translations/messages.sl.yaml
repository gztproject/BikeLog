body:
  dashboard:
    summary: Pregleden delavniški prikaz motorjev, servisne zgodovine in vsakodnevnih opravil.
    inventory: Trenutni motorji v evidenci, pripravljeni za pregled in nadaljnje delo.
    sidebar: Dodajte nov motor in ohranite delavniško evidenco ažurno.
  bikeIndex:
    summary: Delavniški register motorjev s pregledom kilometrov, goriva in servisov na enem mestu.
    inventory: Preglejte posamezen motor, odprite podrobnosti ali takoj vnesite točenje oziroma servis.
    sidebar: Ustvarite nov zapis motorja ali dodajte naslednje točenje kar iz nadzorne plošče.
    empty: Začnite evidenco z vašim prvim motorjem in njegovim delavniškim zapisom.
  bikeShow:
    summary: Delavniški karton motorja z gorivom, servisi in časovnico opravil na enem mestu.
    statistics: Ključni stroški, kakovost vzorca točenj in spremljani servisni intervali.
    parts: Zgodovina servisov po delih, primerjava z intervali in trenutna uspešnost posameznih delov.
    partSelector: Osredotočite se na en del naenkrat in preglejte njegov servisni trend, skladnost z intervali in zgodovino.
    upcoming: Naslednji servisni dogodki, urejeni po nujnosti, z datumom ali kilometrino zapadlosti.
    alerts: Najprej izpostavljena zapadla opravila in nezanesljiva statistika točenj.
    serviceIntervals: Trenutni servisni intervali z zgodovino iz zadnjih zabeleženih servisov.
    refueling: Zgodovina točenj z izračuni, ki ignorirajo drobna ali delna točenja.
    maintenance: Zgodovina delavnice, porabljen čas in stroški za ta motor.
    sidebar: Dodajte točenje, servis ali skočite neposredno na servisni plan.
    noAlerts: Ni aktivnih opozoril. Motor je trenutno v planu.
    noUpcomingEvents: Za ta motor ni nastavljenih servisnih intervalov.
    usingPurchaseBaseline: Če opravilo še ni bilo zabeleženo, se kot izhodišče uporabi datum ali kilometrina nakupa.
    refuelingThreshold: Povprečja goriva ignorirajo delna ali zelo majhna točenja pod %threshold% l.
    refuelingPending: Za zanesljivo statistiko potrebujete polno točenje vsaj %threshold% l.
    refuelingSingleSample: Povprečja goriva trenutno temeljijo le na enem ustreznem polnem točenju.
    refuelingFiltered: "Iz povprečij goriva je bilo izločenih %count% majhnih ali delnih točenj."
    noPartStats: Podatki za statistiko delov še niso na voljo.
    noPartHistory: Za ta del še ni zabeleženih servisnih vnosov.
  servicePlan:
    bike: Preglejte veljavni servisni plan za ta motor in po potrebi dodajte prilagoditve intervalov samo za ta motor.
    bikeCurrent: Združeni modelski privzeti intervali in prilagoditve za ta motor.
    model: Urejajte ponovljivo servisno shemo modela, vključno z deli, opravili in privzetimi intervali.
    modelCurrent: Trenutna modelska opravila in servisni intervali, razvrščeni po delih.
    modelSwitch: Tukaj izberite proizvajalca in model. Predlogi obstoječih opravil ostanejo omejeni na izbrani model in univerzalna opravila.
    override: Dodajte ali prilagodite interval posameznega opravila za ta motor, brez spremembe modelskih privzetih nastavitev.
    existingTaskModelScoped: Ponovno uporabite opravila, ki jih ta model že spremlja. Opravila brez dela se obravnavajo kot univerzalna in jih lahko uporabite na več modelih.
    partOptional: Polje za del pustite prazno, če želite ustvariti splošno opravilo, ki ga lahko uporabite tudi na drugih modelih.
    partEditor: Dodajte nov del za tega proizvajalca, da lahko nanj vežete opravila.
    taskEditor: Uporabite obstoječe opravilo ali ustvarite novo ter mu nastavite privzeti modelski interval.
    empty: Za ta servisni plan še ni nastavljenih vnosov.
  delete:
